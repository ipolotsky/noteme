# Development docker-compose with NON-STANDARD ports
# PostgreSQL: 5433, Redis: 6380, App: 8001
services:
  app:
    build:
      context: .
      target: builder
    env_file: .env
    environment:
      - PATH=/app/.venv/bin:/usr/local/bin:/usr/bin:/bin
      - UV_LINK_MODE=copy
      - NOTEME_DB_HOST=db
      - NOTEME_DB_PORT=5432
      - NOTEME_REDIS_HOST=redis
      - NOTEME_REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - app_venv:/app/.venv
    command: sh -c "uv sync --frozen --no-dev && python -m app"

  worker:
    build:
      context: .
      target: builder
    env_file: .env
    environment:
      - PATH=/app/.venv/bin:/usr/local/bin:/usr/bin:/bin
      - UV_LINK_MODE=copy
      - NOTEME_DB_HOST=db
      - NOTEME_DB_PORT=5432
      - NOTEME_REDIS_HOST=redis
      - NOTEME_REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - app_venv:/app/.venv
    command: sh -c "uv sync --frozen --no-dev && arq app.workers.WorkerSettings"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: noteme
      POSTGRES_USER: noteme
      POSTGRES_PASSWORD: ${NOTEME_DB_PASSWORD}
    volumes:
      - noteme_pgdata:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteme -d noteme"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  databasus:
    image: databasus/databasus:latest
    container_name: noteme-databasus
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4005:4005"
    volumes:
      - noteme_databasus:/databasus-data
    restart: unless-stopped

volumes:
  noteme_pgdata:
  noteme_databasus:
  app_venv:
